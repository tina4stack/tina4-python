name: Tests

on:
  push:
    branches: [v3]
  pull_request:
    branches: [v3]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Report results
        if: always()
        run: echo "Test run completed with exit code $?"
