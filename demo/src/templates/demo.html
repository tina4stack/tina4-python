<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - Tina4 Frond Template Demo</title>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>

    <h2>Items</h2>
    <ul>
    {% for item in items %}
        <li>{{ loop.index }}. {{ item.name }} — {{ item.value }}</li>
    {% endfor %}
    </ul>

    {% if show_footer %}
    <footer>
        <p>Rendered by the Frond template engine (zero-dependency Twig implementation).</p>
        <p>Current time: {{ current_time }}</p>
    </footer>
    {% endif %}
</body>
</html>
